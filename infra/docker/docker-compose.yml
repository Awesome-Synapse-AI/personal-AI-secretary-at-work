services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_secretary}
      POSTGRES_USER: ${POSTGRES_USER:-ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../services/core-ai/db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mongodb:
    image: mongo:6
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  qdrant:
    # Use a Qdrant version that supports the /points/query endpoint (needed by qdrant-client >=1.7)
    image: qdrant/qdrant:v1.16.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3001:3000"

  core-ai:
    build:
      context: ../../services/core-ai
    image: personal-ai-secretary-core-ai:latest
    environment:
      REDIS_URL: redis://redis:6379/0
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-86400}
      AUTH_DISABLED: ${AUTH_DISABLED:-true}
      TOOLS_ENABLED: ${TOOLS_ENABLED:-false}
      SERVICE_AUTH_TOKEN: ${SERVICE_AUTH_TOKEN:-}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-}
      LANGCHAIN_ENDPOINT: ${LANGCHAIN_ENDPOINT:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://llm:11434}
      LLM_CHAT_PATH: ${LLM_CHAT_PATH:-/v1/chat/completions}
      LLM_MODEL: ${LLM_MODEL:-qwen3:0.6b}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-10}
      DOMAIN_SERVICE_URL: http://core-ai:8000/api/v1/domain
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      HUGGINGFACE_HUB_CACHE: /data/hf-cache
      GOOGLE_CALENDAR_ENABLED: ${GOOGLE_CALENDAR_ENABLED:-false}
      GOOGLE_CALENDAR_CREDENTIALS: ${GOOGLE_CALENDAR_CREDENTIALS:-/run/secrets/google_calendar_credentials.json}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-primary}
      GOOGLE_CALENDAR_TIMEZONE: ${GOOGLE_CALENDAR_TIMEZONE:-UTC}
      GOOGLE_CALENDAR_SUBJECT: ${GOOGLE_CALENDAR_SUBJECT:-}
    ports:
      - "8000:8000"
    volumes:
      - ../../hf-cache:/data/hf-cache
      - ./secrets:/run/secrets:ro
    depends_on:
      - redis
      - llm
      # domain endpoints are co-hosted in core-ai

  frontend:
    build:
      context: ../../frontend/web
    environment:
      NEXT_PUBLIC_API_BASE: http://core-ai:8000/api/v1
      NEXT_PUBLIC_WS_BASE: ws://core-ai:8000/api/v1
      NEXT_PUBLIC_APPROVALS_WS: ""
      NEXT_PUBLIC_TENANT_ID: default
      NEXT_PUBLIC_DEMO_USER: demo-user
    ports:
      - "3000:3000"
    depends_on:
      - core-ai

  llm:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    gpus: all
    volumes:
      - ollama_data:/root/.ollama
    entrypoint:
      - "/bin/sh"
      - "-c"
      - "ollama serve > /tmp/ollama.log 2>&1 & sleep 5 && ollama pull qwen3:0.6b && tail -f /tmp/ollama.log"


volumes:
  postgres_data:
  redis_data:
  mongo_data:
  qdrant_data:
  minio_data:
  prometheus_data:
  grafana_data:
  ollama_data:
    external: true
    name: ollama_data
